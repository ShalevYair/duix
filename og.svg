<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0f2744"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- רקע -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- עיגולי עיצוב -->
  <circle cx="80"  cy="80"  r="220" fill="#3b82f6" opacity="0.06"/>
  <circle cx="1140" cy="570" r="280" fill="#60a5fa" opacity="0.07"/>
  <circle cx="600" cy="315" r="350" fill="url(#glow)"/>

  <!-- קו עיטור עליון -->
  <rect x="480" y="168" width="240" height="3" rx="2" fill="#60a5fa" opacity="0.5"/>

  <!-- שם האתר -->
  <text x="600" y="295"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="130"
    font-weight="900"
    fill="#60a5fa"
    text-anchor="middle"
    letter-spacing="12">חדשות</text>

  <!-- קו עיטור תחתון -->
  <rect x="480" y="322" width="240" height="3" rx="2" fill="#60a5fa" opacity="0.5"/>

  <!-- תיאור -->
  <text x="600" y="400"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="32"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="2">קורא חדשות ישראלי חכם</text>

  <!-- פיצ'רים -->
  <text x="600" y="460"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="24"
    fill="#475569"
    text-anchor="middle"
    letter-spacing="1">8 מקורות · 4 סגנונות · ללא פרסומות · ללא הרשמה</text>

  <!-- URL -->
  <text x="600" y="554"
    font-family="'Segoe UI', Arial, monospace"
    font-size="20"
    fill="#334155"
    text-anchor="middle"
    letter-spacing="1">shalevyair.github.io/duix</text>
</svg>
